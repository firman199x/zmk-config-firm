# ZMK_KCONFIG for Dactyl Manuform 6x7
# Uncomment options below to enable features

# RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Encoders (if you add them)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# OLED display
# CONFIG_ZMK_DISPLAY=y

# Power management / deep sleep
# CONFIG_ZMK_SLEEP=y

# USB
CONFIG_ZMK_USB=y

# BLE
CONFIG_ZMK_BLE=y
